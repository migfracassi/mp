<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miguel Fracassi</title>

<link rel="icon" type="image/png" href="migfaviocn.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#ffffff;
    color:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    max-width:700px;
    width:100%;
}

.tag{
    color:#2563eb;
    font-size:.85rem;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:15px;
}

h1{
    font-size:4rem;
    line-height:1;
    margin-bottom:20px;
}

p{
    color:#64748b;
    line-height:1.8;
    margin-bottom:40px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link{
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-decoration:none;
    color:#0f172a;
    border:1px solid #e5e7eb;
    border-radius:18px;
    padding:20px;
    transition:.3s;
}

.link:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 40px rgba(0,0,0,.05);
}

.platform{
    font-weight:700;
}

.username{
    color:#64748b;
}

</style>
</head>
<body>

<div class="container">

    <div class="tag">CONTATO</div>

    <h1>Vamos conversar.</h1>

    <p>
        Entre em contato através das plataformas abaixo.
    </p>

    <div class="links">

        <a class="link" href="https://discord.gg/wyb2cvUm" target="_blank">
            <span class="platform">Discord</span>
            <span class="username">Entrar no servidor →</span>
        </a>

        <a class="link" href="https://instagram.com/miguelfracassii" target="_blank">
            <span class="platform">Instagram</span>
            <span class="username">@miguelfracassii →</span>
        </a>

    </div>

</div>

</body>
</html>
